<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  margin: 0;
  padding: 10px;
}
.container {
  max-width: 700px;
  margin: auto;
}
.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
select, input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}
button {
  width: 100%;
  background: #2c7be5;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="card">
<h2>Cargar viaje</h2>

<form id="form">

<select id="universidad"></select>
<select id="carrera"></select>
<select id="docente"></select>

<label><input type="checkbox" id="checkIda"> Ida</label>
<div id="idaDiv" style="display:none">
<select id="turno">
<option>Mañana</option>
<option>Tarde</option>
<option>Noche</option>
</select>
<select id="parada"></select>
</div>

<label><input type="checkbox" id="checkVuelta"> Vuelta</label>

<div id="vueltaDiv" style="display:none">
<select id="turno_vuelta">
<option>Mañana</option>
<option>Tarde</option>
<option>Noche</option>
</select>
<select id="parada_vuelta">
<option>CUDI</option>
<option>Liniers</option>
<option>Combate</option>
<option>Belgrano</option>
<option>Vuelve por sus propios medios</option>
</select>
</div>

<button>Guardar</button>
</form>

<p id="msg"></p>
</div>

<div class="card">
<button onclick="cargarViajes()">Actualizar</button>
<div id="listaViajes"></div>
</div>

<div class="card">
<h3>Login</h3>
<input id="user">
<input id="pass" type="password">
<button onclick="login()">Entrar</button>
<p id="loginMsg"></p>
</div>

</div>

<script>

const API_URL = "TU_LINK"; // cambiá esto

let SESSION = null;
let DOCENTES = [];

// ===== DATA LOCAL =====
const DATA = {
  "UNAHUR": ["Obstetricia", "Diseño Industrial", "Alimentos"],
  "UBA": ["FMED"],
  "UBA CBC": ["CBC"],
  "UNPAZ": ["Videojuegos"],
  "UNTREF": ["Software"],
  "CUDI": ["Personal"]
};

const PARADAS = {
  "Mañana":["Medicina","Combate","General Paz","Liniers","Va por sus propios medios"],
  "Tarde":["Belgrano","Combate","Liniers","Va por sus propios medios"],
  "Noche":["Belgrano","Combate","Liniers","Va por sus propios medios"]
};

// ===== LOGIN =====
async function login(){
  let res = await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      action:"login",
      user: user.value,
      pass: pass.value
    })
  });

  let data = await res.json();

  if(data.success){
    SESSION = data;
    loginMsg.innerText = "✔ " + data.rol;
    cargarViajes();
  } else {
    loginMsg.innerText = "Error login";
  }
}

// ===== UNIVERSIDADES =====
function cargarUniversidades(){
  universidad.innerHTML = "<option value=''>Elegir universidad</option>";

  for(let u in DATA){
    universidad.innerHTML += `<option value="${u}">${u}</option>`;
  }
}

// ===== CARRERAS =====
universidad.addEventListener("change", function(){

  carrera.innerHTML = "<option value=''>Elegir carrera</option>";

  let lista = DATA[this.value] || [];

  lista.forEach(c=>{
    carrera.innerHTML += `<option value="${c}">${c}</option>`;
  });

  docente.innerHTML = "<option>Elegir docente</option>";
});

// ===== DOCENTES (API) =====
async function cargarDocentes(){
  let res = await fetch(API_URL+"?action=getDocentes");
  DOCENTES = await res.json();
}

// ===== FILTRAR DOCENTES =====
carrera.addEventListener("change", function(){

  docente.innerHTML = "<option value=''>Elegir docente</option>";

  DOCENTES
    .filter(d => d.universidad === universidad.value && d.carrera === this.value)
    .forEach(d=>{
      docente.innerHTML += `
        <option value="${d.nombre}" data-tel="${d.telefono}">
          ${d.nombre}
        </option>`;
    });
});

// ===== PARADAS =====
turno.addEventListener("change", function(){

  parada.innerHTML = "<option value=''>Parada</option>";

  (PARADAS[this.value] || []).forEach(p=>{
    parada.innerHTML += `<option>${p}</option>`;
  });
});

// ===== MOSTRAR BLOQUES =====
checkIda.onchange = ()=> idaDiv.style.display = checkIda.checked ? "block":"none";
checkVuelta.onchange = ()=> vueltaDiv.style.display = checkVuelta.checked ? "block":"none";

// ===== VIAJES =====
async function cargarViajes(){

  let res = await fetch(API_URL+"?action=obtenerViajes");
  let data = await res.json();

  let html = "";
  let dias = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];

  dias.forEach(dia=>{

    let lista = data.filter(v=>v.dia === dia);

    if(lista.length){

      html += `<h3>${dia}</h3>
      <table>
      <tr>
        <th>Uni</th>
        <th>Carrera</th>
        <th>Docente</th>
        <th>Ida</th>
        <th>Horario</th>
        <th>Auto</th>
      </tr>`;

      lista.forEach(v=>{

        let auto = SESSION?.rol==="chofer"
          ? `<td onclick="editarAuto('${v.fecha_viaje}','ida',this)">➕</td>`
          : `<td>${v.auto_ida || "---"}</td>`;

        html += `
        <tr>
          <td>${v.universidad}</td>
          <td>${v.carrera}</td>
          <td>${v.docente}</td>
          <td>${v.parada || "-"}</td>
          <td>${v.horario_ida || "-"}</td>
          ${auto}
        </tr>`;
      });

      html += "</table>";
    }

  });

  listaViajes.innerHTML = html;
}

// ===== GUARDAR VIAJE =====
form.onsubmit = async e=>{
  e.preventDefault();

  let diasSeleccionados = ["Lunes"]; // podés volver a agregar checkboxes después

  let selectedDoc = docente.options[docente.selectedIndex];

  if(!selectedDoc || !selectedDoc.value){
    alert("Seleccioná docente");
    return;
  }

  if(!checkIda.checked && !checkVuelta.checked){
    alert("Seleccioná ida o vuelta");
    return;
  }

  let data = {
    action:"guardarViaje",
    universidad: universidad.value,
    carrera: carrera.value,
    docente_nombre: selectedDoc.value,
    docente_telefono: selectedDoc.getAttribute("data-tel"),
    turno: turno.value,
    parada: parada.value,
    turno_vuelta: turno_vuelta.value,
    parada_vuelta: parada_vuelta.value,
    dias: diasSeleccionados
  };

  await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify(data)
  });

  msg.innerText = "Guardado ✔";
  form.reset();
  cargarViajes();
};

// ===== PATENTE =====
async function editarAuto(id,tipo,celda){

  if(SESSION?.rol !== "chofer"){
    alert("Solo chofer");
    return;
  }

  let patente = prompt("Patente");
  if(!patente) return;

  await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      action:"guardarPatente",
      id,
      tipo,
      patente
    })
  });

  celda.innerText = patente;
}

// INIT
cargarUniversidades();
cargarDocentes();
cargarViajes();

</script>

</body>
</html>
